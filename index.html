<!DOCTYPE html>
<html>
<head>
    <title>Simple Website</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        /* Header */
        header {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Menu bar */
        nav {
            background-color: lightgray;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        nav a:hover {
            color: red;
        }

        /* Content */
        section {
            padding: 20px;
            height: 300px;
        }

        /* Footer */
        footer {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

    <!-- Header -->
    <header>
        <h1>My College Website</h1>
        <p>Welcome to Our Website</p>
    </header>

    <!-- Menu Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Content -->
    <section>
        <h2>Home Page</h2>
        <p>This is a simple website with header, menu bar, and footer.</p>
         </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My College | All Rights Reserved</p>
    </footer>

</body>
</html>
